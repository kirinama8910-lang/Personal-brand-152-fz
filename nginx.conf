# nginx.conf — Марина Кирина личный бренд
# Хостинг: Timeweb, серверы в Санкт-Петербурге
# Замените YOUR_DOMAIN.RU на реальный домен перед деплоем

# ── Редирект HTTP → HTTPS (152-ФЗ: шифрование канала передачи ПДн) ──────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.RU www.YOUR_DOMAIN.RU;

    # ACME-challenge для Let's Encrypt / Timeweb SSL
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS-сервер ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN.RU www.YOUR_DOMAIN.RU;

    root /var/www/YOUR_DOMAIN.RU;
    index index.html;

    # ── SSL (пути Timeweb — при необходимости уточните в панели) ─────────────
    ssl_certificate     /etc/ssl/YOUR_DOMAIN.RU/fullchain.pem;
    ssl_certificate_key /etc/ssl/YOUR_DOMAIN.RU/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── HSTS — браузер запомнит HTTPS на год ─────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Базовые заголовки безопасности ───────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Шрифты: разрешаем только с того же домена (self-hosted, 152-ФЗ) ──────
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "$scheme://YOUR_DOMAIN.RU";
    }

    # ── Статика: долгий кэш для неизменяемых ресурсов ────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 6M;
        add_header Cache-Control "public";
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript font/woff2;
    gzip_min_length 1024;

    # ── SPA / одностраничник: все пути → index.html ──────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Скрыть системные файлы ────────────────────────────────────────────────
    location ~ /\. { deny all; }
}
